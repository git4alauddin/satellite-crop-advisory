services:
  postgis:
    image: postgis/postgis:16-3.4
    container_name: sca_postgis
    environment:
      POSTGRES_USER: sca_user
      POSTGRES_PASSWORD: sca_pass
      POSTGRES_DB: sca_geo
    ports:
      - "5432:5432"
    volumes:
      - postgis_data:/var/lib/postgresql/data

  mongo:
    image: mongo:7
    container_name: sca_mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  postgis_data:
  mongo_data:
